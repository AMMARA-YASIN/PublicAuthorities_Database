name: Convert Excel to Datasette

on:
  push:
    paths:
      - 'data.xlsx'   # only runs when you push a new xlsx, not on every commit

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install xlsx2csv csvs-to-sqlite

      - name: Convert xlsx → csv
        run: python -m xlsx2csv data.xlsx data.csv

      - name: Convert csv → sqlite
        run: |
          csvs-to-sqlite data.csv data.db \
            --fts name \
            --fts notes

      - name: Commit and push data.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.db data.csv
          git commit -m "auto: rebuild database from data.xlsx"
          git push
